<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Xeneon Edge Dashboard</title>
    <link rel="stylesheet" href="css/theme.css" />
    <link rel="stylesheet" href="css/widgets.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      import { applyScale } from './js/scale.js';
      import { initGrid } from './js/grid.js';
      // Framed mode drops the title bar (traffic lights float over the content);
      // reserve their top-left corner so they don't cover the player tabs.
      if (new URLSearchParams(location.search).get('chrome') === 'framed') {
        document.body.classList.add('framed');
      }
      applyScale();
      initGrid(document.getElementById('root'));
    </script>
  </body>
</html>
