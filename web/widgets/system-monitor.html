<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>System</title>
    <link rel="stylesheet" href="../css/theme.css" />
    <link rel="stylesheet" href="../css/widgets.css" />
  </head>
  <body>
    <div class="widget" data-widget="system">
      <div class="chart-grid">
        <div class="chart-card" data-metric="cpu">
          <div class="chart-head">
            <span class="chart-label">CPU</span>
            <span class="chart-value"><span data-field="cpu">--</span>%</span>
          </div>
          <div class="chart-canvas"><canvas></canvas></div>
        </div>
        <div class="chart-card" data-metric="mem">
          <div class="chart-head">
            <span class="chart-label">Memory Used</span>
            <span class="chart-value"><span data-field="ram">--</span></span>
          </div>
          <div class="chart-canvas"><canvas></canvas></div>
        </div>
        <div class="chart-card" data-metric="disk">
          <div class="chart-head">
            <span class="chart-label">Disk</span>
            <span class="chart-value"><span data-field="disk">--</span>%</span>
          </div>
          <div class="chart-canvas"><canvas></canvas></div>
        </div>
        <div class="chart-card" data-metric="net">
          <div class="chart-head">
            <span class="chart-label">Network</span>
            <span class="chart-value net-pair">
              <span class="net down">&#9660;<span data-field="down">--</span></span>
              <span class="net up">&#9650;<span data-field="up">--</span></span>
            </span>
          </div>
          <div class="chart-canvas"><canvas></canvas></div>
        </div>
      </div>
    </div>
    <script type="module">
      import { fetchJson, connectEvents } from '../js/host-bridge.js';
      import { AreaChart, humanRate } from '../js/chart.js';

      const root = document.querySelector('[data-widget="system"]');
      const canvas = (m) => document.querySelector(`[data-metric="${m}"] canvas`);
      const setVal = (f, v) => {
        const e = document.querySelector(`[data-field="${f}"]`);
        if (e) e.textContent = v;
      };

      const charts = {
        cpu: new AreaChart(canvas('cpu'), { label: 'CPU %', unit: '%', color: '#57e08e', min: 0, max: 100 }),
        mem: new AreaChart(canvas('mem'), { label: 'Memory Used', unit: 'GB', color: '#5bc8ff', min: 0, format: (v) => v.toFixed(0) }),
        disk: new AreaChart(canvas('disk'), { label: 'Disk %', unit: '%', color: '#ffb347', min: 0, max: 100 }),
        net: new AreaChart(canvas('net'), { label: 'Down', unit: 'B/s', color: '#a98bff', min: 0, format: humanRate }),
      };

      // test/inspection hooks
      const probe = { cpu: null, ramUsedGB: null, disk: null, down: null, up: null, samples: 0 };
      window.__system = probe;
      window.__charts = charts;

      function renderSystem(d) {
        if (d.cpu != null) {
          setVal('cpu', Math.round(d.cpu));
          charts.cpu.push(d.cpu);
          probe.cpu = d.cpu;
        }
        if (d.ramUsedMB != null) {
          const usedGB = d.ramUsedMB / 1024;
          const totalGB = (d.ramTotalMB || 0) / 1024;
          if (totalGB) charts.mem.max = Math.ceil(totalGB);
          setVal('ram', `${usedGB.toFixed(1)} / ${totalGB.toFixed(0)} GB`);
          charts.mem.push(usedGB);
          probe.ramUsedGB = usedGB;
        }
        if (d.disk != null) {
          setVal('disk', Math.round(d.disk));
          charts.disk.push(d.disk);
          probe.disk = d.disk;
        }
        probe.samples += 1;
        root.dataset.ready = 'true';
      }

      function renderNetwork(d) {
        setVal('down', d.downloadHuman || '0 B/s');
        setVal('up', d.uploadHuman || '0 B/s');
        charts.net.push(d.download || 0);
        probe.down = d.download;
        probe.up = d.upload;
      }

      fetchJson('/api/system').then(renderSystem).catch(() => {});
      fetchJson('/api/network').then(renderNetwork).catch(() => {});
      connectEvents({ system: renderSystem, network: renderNetwork });
    </script>
  </body>
</html>
