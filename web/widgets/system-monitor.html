<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>System</title>
    <link rel="stylesheet" href="../css/theme.css" />
    <link rel="stylesheet" href="../css/widgets.css" />
  </head>
  <body>
    <div class="widget" data-widget="system">
      <div class="chart-grid">
        <div class="chart-card" data-metric="cpu">
          <div class="chart-head">
            <span class="chart-label">CPU</span>
            <span class="chart-value"><span data-field="cpu">--</span>%</span>
          </div>
          <div class="chart-canvas"><canvas></canvas></div>
        </div>
        <div class="chart-card" data-metric="mem">
          <div class="chart-head">
            <span class="chart-label">Memory Used</span>
            <span class="chart-value"><span data-field="ram">--</span></span>
          </div>
          <div class="chart-canvas"><canvas></canvas></div>
        </div>
        <div class="chart-card" data-metric="disk">
          <div class="chart-head">
            <span class="chart-label">Disk</span>
            <span class="chart-value"><span data-field="diskTotal">--</span></span>
          </div>
          <div class="chart-canvas"><canvas></canvas></div>
        </div>
      </div>
    </div>
    <script type="module">
      import { fetchJson, connectEvents } from '../js/host-bridge.js';
      import { AreaChart, Gauge } from '../js/chart.js';
      import { installSwipeNav } from '../js/swipe-nav.js';
      installSwipeNav(); // forward horizontal swipes to the dashboard (page nav)

      const root = document.querySelector('[data-widget="system"]');
      const canvas = (m) => document.querySelector(`[data-metric="${m}"] canvas`);
      const setVal = (f, v) => {
        const e = document.querySelector(`[data-field="${f}"]`);
        if (e) e.textContent = v;
      };

      const charts = {
        cpu: new AreaChart(canvas('cpu'), { label: 'CPU %', unit: '%', color: '#57e08e', min: 0, max: 100 }),
        mem: new AreaChart(canvas('mem'), { label: 'Memory Used', unit: 'GB', color: '#5bc8ff', min: 0, format: (v) => v.toFixed(0) }),
        // Disk is a radial gauge: % in the center, colored by threshold.
        disk: new Gauge(canvas('disk'), { min: 0, max: 100 }),
      };

      // test/inspection hooks
      const probe = { cpu: null, ramUsedGB: null, disk: null, samples: 0 };
      window.__system = probe;
      window.__charts = charts;

      function renderSystem(d) {
        if (d.cpu != null) {
          setVal('cpu', Math.round(d.cpu));
          charts.cpu.push(d.cpu);
          probe.cpu = d.cpu;
        }
        if (d.ramUsedMB != null) {
          const usedGB = d.ramUsedMB / 1024;
          const totalGB = (d.ramTotalMB || 0) / 1024;
          if (totalGB) charts.mem.max = Math.ceil(totalGB);
          setVal('ram', `${usedGB.toFixed(1)} / ${totalGB.toFixed(0)} GB`);
          charts.mem.push(usedGB);
          probe.ramUsedGB = usedGB;
        }
        if (d.disk != null) {
          if (d.diskTotalGB) setVal('diskTotal', `${d.diskTotalGB} GB`);
          charts.disk.set(d.disk);
          probe.disk = d.disk;
        }
        probe.samples += 1;
        root.dataset.ready = 'true';
      }

      fetchJson('/api/system').then(renderSystem).catch(() => {});
      connectEvents({ system: renderSystem });
    </script>
  </body>
</html>
