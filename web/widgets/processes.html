<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Processes</title>
    <link rel="stylesheet" href="../css/theme.css" />
    <link rel="stylesheet" href="../css/widgets.css" />
  </head>
  <body>
    <div class="widget" data-widget="processes">
      <div class="widget-head">
        <span class="widget-title">Top Processes</span>
        <div class="proc-sort" data-field="sort">
          <button class="proc-sort-btn" data-sort="cpu" aria-pressed="true">CPU</button>
          <button class="proc-sort-btn" data-sort="mem" aria-pressed="false">Memory</button>
        </div>
      </div>
      <div class="proc-table">
        <div class="proc-row head">
          <span class="num">PID</span>
          <span class="name">Process</span>
          <span class="name">User</span>
          <span class="num">CPU%</span>
          <span class="num">Memory</span>
        </div>
        <div id="rows"></div>
      </div>
    </div>
    <script type="module">
      import { fetchJson } from '../js/host-bridge.js';
      import { getConfig, setConfig } from '../js/config.js';

      const root = document.querySelector('[data-widget="processes"]');
      const body = document.getElementById('rows');
      const sortBox = document.querySelector('[data-field="sort"]');
      const esc = (s) => {
        const d = document.createElement('div');
        d.textContent = s ?? '';
        return d.innerHTML;
      };

      let sort = getConfig('procSort', 'cpu') === 'mem' ? 'mem' : 'cpu';

      function render(list) {
        body.replaceChildren();
        for (const p of list) {
          const row = document.createElement('div');
          row.className = 'proc-row';
          row.dataset.pid = p.pid;
          row.innerHTML =
            `<span class="num">${p.pid}</span>` +
            `<span class="name">${esc(p.name)}</span>` +
            `<span class="name">${esc(p.user)}</span>` +
            `<span class="num">${Number(p.cpu).toFixed(1)}</span>` +
            `<span class="num">${p.memMB} MB</span>`;
          body.appendChild(row);
        }
        root.dataset.ready = 'true';
      }

      async function tick() {
        try {
          const d = await fetchJson(`/api/processes?limit=12&sort=${sort}`);
          render(d.processes || []);
        } catch {
          /* keep last render */
        }
      }

      function applySort(next) {
        sort = next === 'mem' ? 'mem' : 'cpu';
        setConfig('procSort', sort);
        root.dataset.sort = sort;
        for (const b of sortBox.querySelectorAll('.proc-sort-btn')) {
          b.setAttribute('aria-pressed', String(b.dataset.sort === sort));
        }
        tick();
      }

      sortBox.addEventListener('click', (e) => {
        const b = e.target.closest('.proc-sort-btn');
        if (b) applySort(b.dataset.sort);
      });

      applySort(sort); // sets active button + does the first fetch
      const timer = setInterval(tick, 2000);
      window.addEventListener('pagehide', () => clearInterval(timer));
    </script>
  </body>
</html>
