<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YouTube</title>
    <link rel="stylesheet" href="../css/theme.css" />
    <link rel="stylesheet" href="../css/widgets.css" />
  </head>
  <body>
    <!-- Standalone YouTube (dev + e2e). The dashboard mounts the same module
         inline so the Electron <webview> is top-level (it stays inert in an
         iframe). -->
    <div id="yt-root" style="width: 100vw; height: 100vh"></div>
    <script type="module">
      import { mountYoutube } from '../js/youtube-player.js';
      mountYoutube(document.getElementById('yt-root'));
    </script>
  </body>
</html>
