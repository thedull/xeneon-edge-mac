<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Player</title>
    <link rel="stylesheet" href="../css/theme.css" />
    <link rel="stylesheet" href="../css/widgets.css" />
  </head>
  <body>
    <!-- Standalone tabbed player (dev + e2e). The dashboard mounts the same
         module inline via grid.js so youtube.html stays a direct child iframe. -->
    <div data-widget="player" style="width: 100vw; height: 100vh"></div>
    <!-- hls.js (UMD → window.Hls) for 720p HLS playback. -->
    <script src="../js/vendor/hls.min.js"></script>
    <script type="module">
      import { mountPlayer } from '../js/player-tabs.js';
      const apiParam = new URLSearchParams(location.search).get('api');
      const root = document.querySelector('[data-widget="player"]');
      mountPlayer(root, { apiParam, widgetBase: '' });
      root.dataset.ready = 'true';
    </script>
  </body>
</html>
