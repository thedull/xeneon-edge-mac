appId: com.gabrieltrujillo.xeneon-edge-mac
productName: Xeneon Edge
directories:
  output: dist
files:
  - src/**/*
  - web/**/*
  - package.json
# Native touch helper (built by `npm run build:touch`). Lands in Contents/
# Resources/xeneon-touch; electron-builder code-signs nested Mach-O binaries so it
# inherits the hardened runtime. The user still grants it Input Monitoring +
# Accessibility on first run.
extraResources:
  - from: sidecars/xeneon-touch
    to: xeneon-touch
mac:
  category: public.app-category.utilities
  target:
    - dmg
    - zip
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    NSAppleEventsUsageDescription: >-
      Xeneon Edge controls Apple Music (now playing and transport) on your behalf.
    NSMicrophoneUsageDescription: >-
      Not used by default; reserved for an optional audio-reactive visualizer.
